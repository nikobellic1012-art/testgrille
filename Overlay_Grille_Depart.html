    --sz-title:50px;
    --sz-subtitle:27px;
    --sz-meta:19px;
    --sz-pos:32px;
    --sz-name:30px;
    --sz-team:13px;
    --sz-time:21px;
    --sz-footer:13px;
    --sz-date:15px;
    /* Couleurs éléments */
    --c-title:#ffffff;
    --c-subtitle:#ffffff;
    --c-meta:rgba(255,255,255,.5);
    --c-date:rgba(255,255,255,.38);
    --c-pos-txt:rgba(255,255,255,.8);
    --c-pos-bg:rgba(0,0,0,.5);
    --c-name:#ffffff;
    --c-team:rgba(255,255,255,.42);
    --c-time:#00E676;
    --c-delta:rgba(255,255,255,.32);
    --c-footer:rgba(255,255,255,.22);
    --c-card-bg:rgba(18,18,18,.88);
    --c-card-bg-p1:rgba(28,18,8,.92);
    --c-bar:var(--acc,#D90429);
  }
  #bg-img{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center center;background-repeat:no-repeat;opacity:0;transition:opacity .5s;}
  #bg-grad{position:absolute;inset:0;z-index:1;background:radial-gradient(ellipse at 18% 50%,rgba(217,4,41,.07) 0%,transparent 55%),linear-gradient(135deg,#0A0A0A 0%,#111 50%,#0A0A0A 100%);}
  #ov{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;padding:44px 56px;}
  #hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;opacity:0;transform:translateY(-18px);transition:opacity .55s ease,transform .55s ease;}
  #hdr.vis{opacity:1;transform:translateY(0);}
  #hdr-l{display:flex;align-items:center;gap:18px;}
  #logo-wrap{height:68px;display:flex;align-items:center;}
  #logo-wrap img{height:68px;max-width:150px;object-fit:contain;}
  #logo-wrap.hide{display:none;}
  .hblock{display:flex;flex-direction:column;gap:3px;}
  #ev-title{font-family:var(--font-title);font-size:var(--sz-title);letter-spacing:4px;line-height:1;color:var(--c-title);}
  #ev-meta{font-family:var(--font-meta);font-weight:500;font-size:var(--sz-meta);letter-spacing:3px;text-transform:uppercase;color:var(--c-meta);}
  #hdr-r{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
  #subtitle-tag{font-family:var(--font-subtitle);font-size:var(--sz-subtitle);letter-spacing:6px;color:var(--c-subtitle);padding:4px 16px 2px;border-left:3px solid var(--acc,#D90429);}
  #ev-date{font-family:'Barlow Condensed',sans-serif;font-size:var(--sz-date);letter-spacing:2px;color:var(--c-date);text-transform:uppercase;}
  #grid{flex:1;display:flex;gap:18px;align-items:flex-start;}
  .gcol{flex:1;display:flex;flex-direction:column;gap:5px;}
  .gsep{width:1px;align-self:stretch;background:rgba(255,255,255,.055);flex-shrink:0;}
  .card{display:flex;align-items:center;height:66px;border-radius:4px;overflow:hidden;position:relative;opacity:0;transform:translateX(-38px);transition:opacity .42s cubic-bezier(.22,1,.36,1),transform .42s cubic-bezier(.22,1,.36,1);}
  .card.vis{opacity:1;transform:translateX(0);}
  .card-bg{position:absolute;inset:0;background:var(--c-card-bg);z-index:0;}
  .card.r1 .card-bg{background:var(--c-card-bg-p1);}
  .cpos{width:54px;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--font-pos);font-size:var(--sz-pos);background:var(--c-pos-bg);flex-shrink:0;position:relative;z-index:1;color:var(--c-pos-txt);}
  .card.r1 .cpos{background:var(--pole,#FFD700);color:#000;font-size:calc(var(--sz-pos) + 4px);}
  .card.r2 .cpos{background:rgba(192,160,96,.22);color:#c0a060;}
  .card.r3 .cpos{background:rgba(180,120,60,.18);color:#b47840;}
  .cbar{width:4px;height:100%;background:var(--c-bar);flex-shrink:0;position:relative;z-index:1;}
  .card.r1 .cbar{background:var(--pole,#FFD700);width:5px;}
  .cav{width:56px;height:56px;border-radius:50%;object-fit:cover;margin:0 10px;flex-shrink:0;z-index:1;position:relative;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.07);}
  .cav-e{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);margin:0 14px;flex-shrink:0;z-index:1;position:relative;display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(255,255,255,.18);}
  .cinfo{flex:1;display:flex;flex-direction:column;justify-content:center;gap:2px;min-width:0;position:relative;z-index:1;padding-right:8px;}
  .cname{font-family:var(--font-name);font-size:var(--sz-name);letter-spacing:2px;color:var(--c-name);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card.r1 .cname{font-size:calc(var(--sz-name) + 4px);}
  .cteam{font-family:var(--font-team);font-weight:500;font-size:var(--sz-team);letter-spacing:2px;text-transform:uppercase;color:var(--c-team);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ctblock{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:0 12px 0 8px;min-width:128px;flex-shrink:0;z-index:1;position:relative;}
  .ctime{font-family:var(--font-time);font-weight:700;font-size:var(--sz-time);letter-spacing:2px;color:var(--c-time);white-space:nowrap;}
  .card.r1 .ctime{font-size:calc(var(--sz-time) + 2px);}
  .cdelta{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--c-delta);white-space:nowrap;}
  #footer{height:28px;display:flex;align-items:center;justify-content:space-between;margin-top:12px;opacity:0;transition:opacity .6s .3s;}
  #footer.vis{opacity:1;}
  #fline{flex:1;height:1px;background:linear-gradient(90deg,var(--acc,#D90429) 0%,rgba(217,4,41,.25) 40%,transparent 100%);}
  #flabel{font-family:var(--font-footer);font-size:var(--sz-footer);letter-spacing:3px;text-transform:uppercase;color:var(--c-footer);margin-left:18px;}
  #flabelr{font-family:var(--font-footer);font-size:var(--sz-footer);letter-spacing:2px;text-transform:uppercase;color:var(--c-footer);}
  #rev{position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:rgba(0,0,0,.62);opacity:0;pointer-events:none;transition:opacity .35s;}
  #rev.show{opacity:1;}
  #rev-lbl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:8px;color:rgba(255,255,255,.45);text-transform:uppercase;}
  #rev-num{font-family:'Bebas Neue',sans-serif;font-size:190px;line-height:1;color:#fff;text-shadow:0 0 80px var(--acc,#D90429);transition:all .28s ease;}
  #rev-name{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:6px;color:rgba(255,255,255,.82);}
  #ctrl{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(8,8,8,.96);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 16px;display:flex;gap:9px;align-items:center;z-index:100;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,.4);text-transform:uppercase;}
  #ctrl button{background:rgba(217,4,41,.8);color:#fff;border:none;border-radius:4px;padding:5px 12px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-weight:700;}
  #ctrl button:hover{background:#D90429;}
  #ctrl button.sec{background:rgba(255,255,255,.07);}
  #ctrl-dot{width:7px;height:7px;border-radius:50%;background:#ffab00;flex-shrink:0;}
  #ctrl-dot.ok{background:#00e676;box-shadow:0 0 5px #00e676;}
  #ctrl-dot.err{background:#ff4444;}
  #ctrl-dot.connecting{background:#ffab00;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  body.obs #ctrl{display:none;}
  /* STATUS MSG */
  #status-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(255,255,255,.15);font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;pointer-events:none;z-index:3;}
  #status-msg p{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:2px;font-weight:400;margin-top:10px;color:rgba(255,255,255,.1);}
</style>
</head>
<body>

<div id="bg-img"></div>
<div id="bg-grad"></div>

<div id="rev">
  <div id="rev-lbl">Position</div>
  <div id="rev-num">P1</div>
  <div id="rev-name"></div>
</div>

<div id="ov">
  <div id="hdr">
    <div id="hdr-l">
      <div id="logo-wrap" class="hide"><img id="logo-img" src="" alt=""></div>
      <div class="hblock">
        <div id="ev-title">Championship</div>
        <div id="ev-meta"></div>
      </div>
    </div>
    <div id="hdr-r">
      <div id="subtitle-tag">Grille de Départ</div>
      <div id="ev-date"></div>
    </div>
  </div>
  <div id="grid">
    <div id="status-msg">EN ATTENTE DES DONNÉES<p>Ouvre l'éditeur et clique 🚀 Envoyer</p></div>
  </div>
  <div id="footer">
    <div id="fline"></div>
    <div id="flabel"></div>
    <div id="flabelr"></div>
  </div>
</div>

<div id="ctrl">
  <div id="ctrl-dot" class="connecting"></div>
  <span id="ctrl-lbl">En attente…</span>
  <button onclick="toggleMode()">Mode</button>
  <button onclick="startAnim()">▶ Lancer</button>
  <button class="sec" onclick="resetAnim()">↺ Reset</button>
</div>

<script>
const ABLY_KEY  = 'YWBqmQ.FeXoQA:-bYCNUhoWm9ZRzQ2yB82S_DGhRrTwsBY4NFvMIm3qLA';
const CHAN_MAIN = 'tzr-grille-depart';      // config légère (textes, couleurs, pilotes sans images)
const CHAN_ASSETS = 'tzr-grille-assets';    // assets lourds (logo, bg, avatars) séparément

let cfg = null, assets = {};
let animMode = 'full', animSpeed = 1500, showDelta = true;
let revRunning = false, revIdx = 0, revTimer = null;
const root = document.documentElement;

// ── ABLY ──
function initAbly() {
  const client = new Ably.Realtime({ key: ABLY_KEY });
  const chMain   = client.channels.get(CHAN_MAIN);
  const chAssets = client.channels.get(CHAN_ASSETS);

  client.connection.on('connected',    () => setDot('ok'));
  client.connection.on('connecting',   () => setDot('connecting'));
  client.connection.on('disconnected', () => setDot('err'));
  client.connection.on('failed',       () => { setDot('err'); log('Connexion Ably échouée'); });

  // Écoute config principale
  chMain.subscribe('config', msg => {
    log('Config reçue via Ably');
    cfg = msg.data;
    resetAnim();
    applyConfig(cfg);
    setTimeout(startAnim, 400);
  });

  // Écoute assets — on fusionne pour ne pas perdre bg quand logo arrive et vice versa
  chAssets.subscribe('assets', msg => {
    const data = msg.data || {};
    log('Assets reçus: ' + (data.type || 'complet'));
    // Fusionner dans assets global
    if (data.type === 'bg')      { assets.bg = data.bg; assets.bgOpacity = data.bgOpacity; }
    else if (data.type === 'logo')    { assets.logo = data.logo; }
    else if (data.type === 'font')    { assets.cf = data.cf; assets.cfName = data.cfName; }
    else if (data.type === 'avatars') { assets.avatarMap = { ...(assets.avatarMap||{}), ...data.avatarMap }; }
    else { assets = { ...assets, ...data }; }
    if (cfg) applyAssets(data);
  });

  // Historique au chargement
  client.connection.once('connected', () => {
    // 1. Charger la config en premier
    chMain.history({ limit: 1 }, (err, page) => {
      if (!err && page && page.items.length > 0) {
        cfg = page.items[0].data;
        log('Config restaurée');
        applyConfig(cfg); // buildGrid est appelé ici
        if (isOBS()) setTimeout(startAnim, 800);
      } else {
        log('En attente de données…');
      }

      // 2. Charger les assets APRÈS la config (la grille doit exister pour les avatars)
      chAssets.history({ limit: 5 }, (err2, page2) => {
        if (!err2 && page2 && page2.items.length > 0) {
          const items = [...page2.items].reverse();
          items.forEach(item => {
            const data = item.data || {};
            if (data.type === 'bg')        { assets.bg = data.bg; assets.bgOpacity = data.bgOpacity; }
            else if (data.type === 'logo') { assets.logo = data.logo; }
            else if (data.type === 'font') { assets.cf = data.cf; assets.cfName = data.cfName; }
            else if (data.type === 'avatars') { assets.avatarMap = { ...(assets.avatarMap||{}), ...data.avatarMap }; }
            else { assets = { ...assets, ...data }; }
          });
          log('Assets restaurés');
          if (assets.bg)        applyAssets({ type:'bg',      bg:assets.bg,          bgOpacity:assets.bgOpacity });
          if (assets.logo)      applyAssets({ type:'logo',    logo:assets.logo });
          if (assets.cf)        applyAssets({ type:'font',    cf:assets.cf,          cfName:assets.cfName });
          if (assets.avatarMap) setTimeout(() => applyAssets({ type:'avatars', avatarMap:assets.avatarMap }), 100);
        }
      });
    });
  });
}

function setDot(state) {
  const d = document.getElementById('ctrl-dot');
  if (d) { d.className = state; }
}

function log(msg) {
  console.log('[TZR Overlay]', msg);
  const el = document.getElementById('ctrl-lbl');
  if (el) el.textContent = msg;
}

// ── APPLY CONFIG (sans assets lourds) ──
function applyConfig(c) {
  if (!c) return;
  const s = c.style || {}, t = c.texts || {}, ev = c.event || {}, an = c.anim || {};

  // CSS vars
  if (s.accent)    root.style.setProperty('--acc',  s.accent);
  if (s.timeColor) root.style.setProperty('--tc',   s.timeColor);
  if (s.poleColor) root.style.setProperty('--pole', s.poleColor);

  // Fond couleur
  if (s.bg) {
    document.getElementById('bg-grad').style.background =
      `radial-gradient(ellipse at 18% 50%,rgba(217,4,41,.07) 0%,transparent 55%),` +
      `linear-gradient(135deg,${s.bg} 0%,${lighten(s.bg,15)} 50%,${s.bg} 100%)`;
  }

  // Polices via CSS vars
  const fonts = c.fonts || {};
  const fmap = {
    '--font-title':    fonts.title    || "'Bebas Neue',sans-serif",
    '--font-name':     fonts.name     || "'Bebas Neue',sans-serif",
    '--font-team':     fonts.team     || "'Barlow Condensed',sans-serif",
    '--font-time':     fonts.time     || "'Barlow Condensed',sans-serif",
    '--font-pos':      fonts.pos      || "'Bebas Neue',sans-serif",
    '--font-meta':     fonts.meta     || "'Barlow Condensed',sans-serif",
    '--font-footer':   fonts.footer   || "'Barlow Condensed',sans-serif",
    '--font-subtitle': fonts.subtitle || "'Bebas Neue',sans-serif",
  };
  Object.entries(fmap).forEach(([k,v]) => root.style.setProperty(k, v));

  // Tailles de police via CSS vars
  const sz = c.sizes || {};
  const smap = {
    '--sz-title':    (sz.title    || 50) + 'px',
    '--sz-subtitle': (sz.subtitle || 27) + 'px',
    '--sz-meta':     (sz.meta     || 19) + 'px',
    '--sz-date':     (sz.date     || 15) + 'px',
    '--sz-pos':      (sz.pos      || 32) + 'px',
    '--sz-name':     (sz.name     || 30) + 'px',
    '--sz-team':     (sz.team     || 13) + 'px',
    '--sz-time':     (sz.time     || 21) + 'px',
    '--sz-footer':   (sz.footer   || 13) + 'px',
  };
  Object.entries(smap).forEach(([k,v]) => root.style.setProperty(k, v));

  // Couleurs éléments
  const cl = c.colors2 || {};
  const cmap = {
    '--c-title':       cl.title      || '#ffffff',
    '--c-subtitle':    cl.subtitle   || '#ffffff',
    '--c-meta':        cl.meta       || 'rgba(255,255,255,.5)',
    '--c-date':        cl.date       || 'rgba(255,255,255,.38)',
    '--c-pos-txt':     cl.posTxt     || 'rgba(255,255,255,.8)',
    '--c-pos-bg':      cl.posBg      || 'rgba(0,0,0,.5)',
    '--c-name':        cl.name       || '#ffffff',
    '--c-team':        cl.team       || 'rgba(255,255,255,.42)',
    '--c-time':        cl.time       || (s.timeColor || '#00E676'),
    '--c-delta':       cl.delta      || 'rgba(255,255,255,.32)',
    '--c-footer':      cl.footer     || 'rgba(255,255,255,.22)',
    '--c-card-bg':     cl.cardBg     || 'rgba(18,18,18,.88)',
    '--c-card-bg-p1':  cl.cardBgP1   || 'rgba(28,18,8,.92)',
    '--c-bar':         cl.bar        || (s.accent || '#D90429'),
  };
  Object.entries(cmap).forEach(([k,v]) => root.style.setProperty(k, v));

  // Textes
  document.getElementById('ev-title').textContent     = t.champ  || 'Championship';
  document.getElementById('subtitle-tag').textContent = t.sub    || 'Grille de Départ';
  document.getElementById('ev-date').textContent      = ev.date  || '';
  document.getElementById('flabel').textContent       = t.fl     || '';
  document.getElementById('flabelr').textContent      = t.fr     || '';
  document.getElementById('rev-lbl').textContent      = t.rev    || 'Position';
  const meta = [ev.track, ev.round].filter(Boolean).join(' · ');
  document.getElementById('ev-meta').textContent = t.slogan ? meta + '  ·  ' + t.slogan : meta;

  // Anim
  animMode  = an.mode  || 'full';
  animSpeed = parseInt(an.speed) || 1500;
  showDelta = an.showDelta !== '0';
  document.getElementById('ctrl-lbl').textContent = 'Mode: ' + (animMode === 'reveal' ? 'révélation' : 'complet');

  // Grille
  buildGrid(c.pilots || []);

  // Appliquer les assets connus (bg, logo) — pas les avatars (gérés séparément)
  if (assets) {
    if (assets.bg)   applyAssets({ type:'bg',   bg:assets.bg,   bgOpacity:assets.bgOpacity });
    if (assets.logo) applyAssets({ type:'logo', logo:assets.logo });
    if (assets.cf)   applyAssets({ type:'font', cf:assets.cf,   cfName:assets.cfName });
    // Avatars après un tick pour que le DOM soit prêt
    if (assets.avatarMap) setTimeout(() => applyAssets({ type:'avatars', avatarMap:assets.avatarMap }), 50);
  }
}

// ── APPLY ASSETS ──
// a = objet avec .type (optionnel) + données
function applyAssets(a) {
  if (!a) return;
  const s = cfg?.style || {};
  const type = a.type; // 'bg' | 'logo' | 'font' | 'avatars' | undefined (tout)

  // ── Avatars pilotes ──
  if (type === 'avatars') {
    const map = a.avatarMap || {};
    Object.entries(map).forEach(([id, src]) => {
      if (!src) return;
      document.querySelectorAll('.card').forEach(card => {
        if (card.dataset.pilotId !== String(id)) return;
        const placeholder = card.querySelector('.cav-e');
        if (placeholder) {
          const img = document.createElement('img');
          img.className = 'cav';
          img.src = src;
          img.alt = '';
          placeholder.replaceWith(img);
        } else {
          const existing = card.querySelector('.cav');
          if (existing) existing.src = src;
        }
      });
    });
    return;
  }

  // ── Image de fond ──
  if (!type || type === 'bg') {
    const bgSrc = a.bg || null;
    const oldImg = document.getElementById('bg-img-tag');
    if (oldImg) oldImg.remove();
    if (bgSrc) {
      const op = parseFloat(a.bgOpacity !== undefined ? a.bgOpacity : (s.bgOpacity || 20)) / 100;
      const img = document.createElement('img');
      img.id = 'bg-img-tag';
      img.src = bgSrc;
      img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center center;z-index:0;pointer-events:none;opacity:' + op;
      document.body.insertBefore(img, document.body.firstChild);
    }
  }

  // ── Logo organisation ──
  if (!type || type === 'logo') {
    const logoWrap = document.getElementById('logo-wrap');
    const logoImg  = document.getElementById('logo-img');
    const src = a.logo || null;
    if (src) {
      logoWrap.classList.remove('hide');
      logoImg.src = src;
    } else if (!type) {
      logoWrap.classList.add('hide');
    }
  }

  // ── Police custom ──
  if (!type || type === 'font') {
    if (a.cf && a.cfName && !document.getElementById('custom-font-style')) {
      const st = document.createElement('style');
      st.id = 'custom-font-style';
      st.textContent = `@font-face{font-family:'${a.cfName}';src:url('${a.cf}');}`;
      document.head.appendChild(st);
    }
  }
}

// ── GRID — disposition en paires : P1-P2 / P3-P4 / … ──
function buildGrid(pilots) {
  const gc = document.getElementById('grid');
  gc.innerHTML = '';

  const active = pilots.filter(p => p.name || p.time);
  if (!active.length) {
    gc.innerHTML = '<div id="status-msg">AUCUN PILOTE<p>Ajoute des pilotes dans l\'éditeur</p></div>';
    return;
  }

  // Wrapper vertical : toutes les rangées de 2 cartes côte à côte
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'flex:1;display:flex;flex-direction:column;gap:5px;width:100%;';

  for (let i = 0; i < active.length; i += 2) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:10px;';

    const left = mkCard(active[i], i+1, active);
    left.style.flex = '1';
    row.appendChild(left);

    if (active[i+1]) {
      const right = mkCard(active[i+1], i+2, active);
      right.style.flex = '1';
      row.appendChild(right);
    } else {
      // Pilote impair : placeholder invisible pour garder la largeur
      const ghost = document.createElement('div');
      ghost.style.flex = '1';
      row.appendChild(ghost);
    }

    wrapper.appendChild(row);
  }

  gc.appendChild(wrapper);
}

function mkCard(p, pos, all) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.pos = pos;
  card.dataset.pilotId = String(p.id); // pour injection avatars
  if (pos === 1) card.classList.add('r1');
  else if (pos === 2) card.classList.add('r2');
  else if (pos === 3) card.classList.add('r3');

  let delta = '';
  if (showDelta && pos > 1 && all[0]?.time && p.time) {
    const d = (pt(p.time) - pt(all[0].time)) / 1000;
    if (isFinite(d) && d > 0) delta = '+' + d.toFixed(3);
  }

  card.innerHTML =
    `<div class="card-bg"></div>` +
    `<div class="cpos">${pos}</div>` +
    `<div class="cbar"></div>` +
    (p.avatar
      ? `<img class="cav" src="${p.avatar}" alt="">`
      : `<div class="cav-e">👤</div>`) +
    `<div class="cinfo">` +
      `<div class="cname">${esc(p.name) || '—'}</div>` +
      (p.team ? `<div class="cteam">${esc(p.team)}</div>` : '') +
    `</div>` +
    `<div class="ctblock">` +
      `<div class="ctime">${esc(p.time) || '—'}</div>` +
      (delta ? `<div class="cdelta">${delta}</div>` : '') +
    `</div>`;
  return card;
}

// ── ANIMATIONS ──
function startAnim() {
  resetAnim();
  if (animMode === 'reveal') startReveal(); else startFull();
}

function startFull() {
  document.getElementById('hdr').classList.add('vis');
  document.getElementById('footer').classList.add('vis');
  document.querySelectorAll('.card').forEach((c, i) =>
    setTimeout(() => c.classList.add('vis'), 70 + i * 65));
}

function startReveal() {
  if (revRunning) return;
  revRunning = true;
  const cards = Array.from(document.querySelectorAll('.card'))
    .sort((a, b) => parseInt(b.dataset.pos) - parseInt(a.dataset.pos));
  if (!cards.length) return;
  revIdx = 0;
  document.getElementById('hdr').classList.remove('vis');
  document.getElementById('footer').classList.remove('vis');

  function next() {
    if (revIdx >= cards.length) {
      revRunning = false;
      document.getElementById('rev').classList.remove('show');
      document.getElementById('hdr').classList.add('vis');
      document.getElementById('footer').classList.add('vis');
      return;
    }
    const card = cards[revIdx];
    const pos  = card.dataset.pos;
    const name = card.querySelector('.cname')?.textContent || '';
    const rv   = document.getElementById('rev');
    const rn   = document.getElementById('rev-num');
    rv.classList.add('show');
    rn.textContent = 'P' + pos;
    document.getElementById('rev-name').textContent = name;
    rn.style.transform  = 'scale(1.18)';
    rn.style.textShadow = '0 0 120px var(--acc,#D90429),0 0 40px var(--acc,#D90429)';
    setTimeout(() => { rn.style.transform='scale(1)'; rn.style.textShadow='0 0 80px var(--acc,#D90429)'; }, 200);
    setTimeout(() => {
      rv.classList.remove('show');
      card.classList.add('vis');
      if (parseInt(pos) === 1) {
        setTimeout(() => {
          document.getElementById('hdr').classList.add('vis');
          document.getElementById('footer').classList.add('vis');
        }, 300);
      }
    }, animSpeed * 0.65);
    revIdx++;
    revTimer = setTimeout(next, animSpeed);
  }
  setTimeout(next, 400);
}

function resetAnim() {
  clearTimeout(revTimer);
  revRunning = false; revIdx = 0;
  document.getElementById('rev').classList.remove('show');
  document.getElementById('hdr').classList.remove('vis');
  document.getElementById('footer').classList.remove('vis');
  document.querySelectorAll('.card').forEach(c => c.classList.remove('vis'));
}

function toggleMode() {
  animMode = animMode === 'full' ? 'reveal' : 'full';
  document.getElementById('ctrl-lbl').textContent = 'Mode: ' + (animMode === 'reveal' ? 'révélation' : 'complet');
  resetAnim();
}

// ── HELPERS ──
function pt(t) {
  if (!t) return Infinity;
  const p = t.trim().split(':');
  return p.length === 2 ? parseInt(p[0]) * 60000 + parseFloat(p[1]) * 1000 : parseFloat(t) * 1000;
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function isOBS() { return navigator.userAgent.toLowerCase().includes('obs') || location.search.includes('obs=1'); }
function lighten(hex, amt) {
  try {
    let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt); g=Math.min(255,g+amt); b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
  } catch { return hex; }
}

// ── BroadcastChannel (aperçu dans le même navigateur) ──
if (typeof BroadcastChannel !== 'undefined') {
  const bc = new BroadcastChannel('tzr-grille-bc');
  bc.onmessage = e => {
    if (e.data?.type === 'config') {
      cfg = e.data.cfg;
      assets = e.data.cfg?.assets || {};
      resetAnim();
      applyConfig(cfg);
      // Appliquer les assets inline (inclus dans cfg pour le preview)
      if (assets.logo || assets.bg) applyAssets(assets);
      setTimeout(startAnim, 300);
    }
  };
}

window.onload = () => {
  if (isOBS()) document.body.classList.add('obs');
  initAbly();
};
</script>
